# Builds the Psych 1.0.4 clean-fixes base for Windows / Linux / macOS.

name: Build

on:
  workflow_dispatch:

jobs:
  buildWindows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install Haxe dependencies
        run: |
          cd setup
          windows.bat
        shell: cmd

      - name: Create version tag
        run: echo "${{ github.run_id }}" > VERSION
        shell: cmd

      - name: Compile
        run: haxelib run lime build Project.xml windows --app-version="1.0.4-${{ github.run_id }}"

      - name: Publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: windowsBuild
          path: export/release/windows/bin

  buildLinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install system packages (VLC)
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

      - name: Install Haxe dependencies
        run: |
          chmod +x ./setup/unix.sh
          cd setup && ./unix.sh

      - name: Create version tag
        run: echo "${{ github.run_id }}" > VERSION

      - name: Compile
        run: haxelib run lime build Project.xml linux --app-version="1.0.4-${{ github.run_id }}"

      - name: Publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: linuxBuild
          path: export/release/linux/bin

  buildMac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install Haxe dependencies
        run: |
          chmod +x ./setup/unix.sh
          cd setup && ./unix.sh

      - name: Create version tag
        run: echo "${{ github.run_id }}" > VERSION

      - name: Compile
        run: haxelib run lime build Project.xml mac --app-version="1.0.4-${{ github.run_id }}"

      - name: Publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: macBuild
          path: export/release/macos/bin
